<text font-size="13" font-weight="500" fill="#633806" x="340" y="652" text-anchor="middle" dominant-baseline="central">Strict eligibility · all 4 index dates</text>
<text font-size="11" fill="#854f0b" x="340" y="670" text-anchor="middle" dominant-baseline="central">Lookback ≥ 5 years before index date</text>
<text font-size="11" fill="#854f0b" x="340" y="686" text-anchor="middle" dominant-baseline="central">Follow-up ≥ 5 years after index date (survival analyses)</text>

