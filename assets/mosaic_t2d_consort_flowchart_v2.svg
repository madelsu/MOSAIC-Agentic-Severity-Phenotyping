<text font-size="11" fill="#0f6e56" x="340" y="782" text-anchor="middle" dominant-baseline="central">Age at diagnosis: mean 36.4 yrs (range 21.2–53.0)</text>
<text font-size="11" fill="#0f6e56" x="340" y="798" text-anchor="middle" dominant-baseline="central">Deceased 52.5% · Alive 47.5%</text>
<text font-size="11" fill="#0f6e56" x="340" y="814" text-anchor="middle" dominant-baseline="central">Obs. duration mean 61.4 yrs · DNA 48.8% · DICOM 12.0%</text>
<text font-size="11" fill="#0f6e56" x="340" y="830" text-anchor="middle" dominant-baseline="central">First treatment: Metformin 64.5% · Insulin 34.7% · GLP-1 0.8%</text>

