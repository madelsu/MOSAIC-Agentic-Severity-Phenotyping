<text font-size="11" fill="#0f6e56" x="168" y="246" dominant-baseline="central">90781000119102 · Microalbuminuria · 157141000119108 · Proteinuria</text>
<text font-size="11" fill="#0f6e56" x="168" y="262" dominant-baseline="central">60951000119105 · Blindness due to type 2 DM</text>

